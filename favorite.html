<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Recipe & Meals</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- navbar -->
    <nav>
      <div class="full-nav">
        <h3 class="nav_heading">Recipe & Meals</h3>
        <div class="nav_elements">
          <li><a href="index.html">Home</a></li>
          <li><a href="search.html">Search</a></li>
          <li><a href="random.html">Random</a></li>
          <li><a href="filter.html">Filter</a></li>
          <li><a href="favorite.html">Favorite</a></li>
          <li><a href="delete.html">Delete Account</a></li>
        </div>
        <div class="sign-log">
          <a href="signup.html"><button>Signup</button></a>
          <a href="login.html"><button>Login</button></a>
        </div>
      </div>
    </nav>
    
    <div class="form-container">
      <h1>Favorite Item</h1>
      <form id="select-fav">
        <label for="fav">Tell Favorite item</label><br />
        <input
        type="text"
        id="favorite"
        name="fav"
        placeholder="Enter your favorite item"
        required
        /><br /><br />
        
        <button type="submit" class="special-button" id="favButton">
          Choosed
        </button>
      </form>
      <br />
      
      <!-- Success/Error messages -->
      <div id="userFavResult"></div>
      
      <!-- Hidden recipe button -->
      <button id="getRecipeBtn" class="special-button" style="display: none">
        Get recipe info
      </button>
      
      <!-- Recipe card -->
      <div id="recipeBox" class="recipe-box"></div>
    </div>
    
    <script src="script.js"></script>
    <script src="navbar.js"></script>
  </body>
  </html>
